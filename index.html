<!DOCTYPE html>
<html lang = "en" >
<head>
  <p>Beautiful Calculator - Made By Nostalgia</p>
<meta charset = "UTF-8">
<meta name = "viewport">
<meta http-equiv="X-UA-Compatible" content="width=device-width, initial-scale=1.0">
<title> Calculator By Nostalgia </title>
</head>
<link rel="stylesheet" href="style.css">
<body>
<div class= "Calculator">
    <input type = "text" id = "inputBox" placeholder = "0" readonly>
  <div>

    <button class = "operator">AC</button>
  </div>
  <div>
    <button class = "operator">DEL</button>
    <button> 1 </button>
    <button> 2 </button>
    <button> 3 </button>
    <button class = "operator"> + </button>
  </div>
  <div>
    <button class = "operator"> ! </button>
    <button> 4 </button>
    <button> 5 </button>
    <button> 6 </button>
    <button class = "operator"> - </button>
  </div>
  <div>
  <button class = "operator"> / </button>
  <button> 7 </button>
  <button> 8 </button>
  <button> 9 </button>
  <button class = "operator"> * </button>
  </div>
  <div>
    <button class = "operator"> ** </button>
    <button> 0 </button>
    <button class = "operator"> . </button>
    <button class = "operator"> ÷ </button>
    <button class = "operator"> = </button>
  </div>
</div>
<script src = "script.js"></script>
</body>
</html>
